<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LSM Battery Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    #reader { width: 100%; min-height: 250px; background: #000; border-radius: 8px; margin-bottom: 10px; display: none; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    
    .btn-scan { background: #3498db; width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    
    .btn-container { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
    
    /* Small width buttons as requested */
    .btn-in, .btn-out {
      width: 100px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-in { background: #27ae60; }
    .btn-out { background: #d35400; }
    
    button:disabled { background: #ccc; cursor: not-allowed; }
    button:active { transform: scale(0.95); }
    #status { margin-top: 20px; font-weight: bold; color: #7f8c8d; }
  </style>
</head>
<body>
  <div class="card">
    <div style="margin-bottom: 15px;">
      <span style="font-size: 36px; font-weight: 900; color: #FF4500;">LSM</span>
      <div style="font-size: 10px; color: #657273; letter-spacing: 2px; font-weight: bold;">LAO SMART MOBILITY</div>
    </div>

    <div id="reader"></div>
    <button id="scanBtn" class="btn-scan" onclick="toggleCamera()">📷 OPEN SCANNER</button>

    <input type="text" id="bid" placeholder="Battery ID">
    <input type="text" id="vno" placeholder="Vehicle No">
    <input type="number" id="mil" placeholder="Mileage">

    <div class="btn-container">
      <button id="btnIn" class="btn-in" onclick="process('IN')">LOG IN</button>
      <button id="btnOut" class="btn-out" onclick="process('OUT')">LOG OUT</button>
    </div>

    <div id="status">Ready</div>
  </div>

  <script>
    const scriptURL = "PASTE_YOUR_GOOGLE_WEB_APP_URL_HERE"; // <--- VERY IMPORTANT

    let scanner;
    let isScanning = false;

    function beep() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function toggleCamera() {
      const readerDiv = document.getElementById('reader');
      const scanBtn = document.getElementById('scanBtn');
      if (!isScanning) {
        readerDiv.style.display = 'block';
        scanBtn.innerText = "🛑 CLOSE SCANNER";
        startScanner();
      } else {
        if (scanner) scanner.stop().then(() => {
          readerDiv.style.display = 'none';
          scanBtn.innerText = "📷 OPEN SCANNER";
        });
      }
      isScanning = !isScanning;
    }

    function startScanner() {
      scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        beep();
        document.getElementById('bid').value = text;
        toggleCamera();
      });
    }

    function process(type) {
      const status = document.getElementById('status');
      const btnIn = document.getElementById('btnIn');
      const btnOut = document.getElementById('btnOut');

      btnIn.disabled = true;
      btnOut.disabled = true;
      status.innerText = "⏳ Saving to Google Sheets...";
      status.style.color = "orange";

      const data = {
        batteryId: document.getElementById('bid').value,
        vehicleNo: document.getElementById('vno').value,
        mileage: document.getElementById('mil').value,
        type: type
      };

      // FETCH method for GitHub hosting
      fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(data)
      })
      .then(() => {
        beep();
        status.innerText = "✅ Success: Logged " + type;
        status.style.color = "green";
        document.getElementById('bid').value = "";
        document.getElementById('vno').value = "";
        document.getElementById('mil').value = "";
        btnIn.disabled = false;
        btnOut.disabled = false;
      })
      .catch(err => {
        status.innerText = "❌ Error: Check Connection";
        status.style.color = "red";
        btnIn.disabled = false;
        btnOut.disabled = false;
      });
    }
  </script>
</body>
</html>
